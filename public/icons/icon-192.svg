<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" fill="#0D0D0D"/>
  <g transform="translate(96,96)">
    <!-- Outer circuit ring -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#00FF41" stroke-width="3" opacity="0.4"/>
    <!-- Inner circuit ring -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.6"/>
    <!-- C shape -->
    <path d="M 30,-50 A 58,58 0 1,0 30,50" fill="none" stroke="#00FF41" stroke-width="6" stroke-linecap="round"/>
    <!-- Circuit nodes -->
    <circle cx="30" cy="-50" r="5" fill="#00FF41"/>
    <circle cx="30" cy="50" r="5" fill="#00FF41"/>
    <circle cx="-58" cy="0" r="4" fill="#00FF41"/>
    <circle cx="0" cy="-58" r="3" fill="#00FF41" opacity="0.7"/>
    <circle cx="0" cy="58" r="3" fill="#00FF41" opacity="0.7"/>
    <!-- Circuit traces -->
    <line x1="30" y1="-50" x2="70" y2="-50" stroke="#00FF41" stroke-width="2" opacity="0.5"/>
    <line x1="30" y1="50" x2="70" y2="50" stroke="#00FF41" stroke-width="2" opacity="0.5"/>
    <line x1="-58" y1="0" x2="-75" y2="0" stroke="#00FF41" stroke-width="2" opacity="0.5"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="#00FF41" opacity="0.8"/>
    <!-- Glow effect -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#00FF41" stroke-width="1" opacity="0.15"/>
  </g>
</svg>
