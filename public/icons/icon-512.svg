<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0D0D0D"/>
  <g transform="translate(256,256)">
    <!-- Outer circuit ring -->
    <circle cx="0" cy="0" r="190" fill="none" stroke="#00FF41" stroke-width="4" opacity="0.3"/>
    <!-- Mid circuit ring -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="#00FF41" stroke-width="3" opacity="0.5"/>
    <!-- Inner circuit ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.6"/>
    <!-- C shape -->
    <path d="M 80,-130 A 152,152 0 1,0 80,130" fill="none" stroke="#00FF41" stroke-width="14" stroke-linecap="round"/>
    <!-- Circuit nodes -->
    <circle cx="80" cy="-130" r="12" fill="#00FF41"/>
    <circle cx="80" cy="130" r="12" fill="#00FF41"/>
    <circle cx="-152" cy="0" r="10" fill="#00FF41"/>
    <circle cx="0" cy="-152" r="7" fill="#00FF41" opacity="0.7"/>
    <circle cx="0" cy="152" r="7" fill="#00FF41" opacity="0.7"/>
    <circle cx="-107" cy="-107" r="5" fill="#00FF41" opacity="0.5"/>
    <circle cx="-107" cy="107" r="5" fill="#00FF41" opacity="0.5"/>
    <!-- Circuit traces -->
    <line x1="80" y1="-130" x2="190" y2="-130" stroke="#00FF41" stroke-width="3" opacity="0.4"/>
    <line x1="80" y1="130" x2="190" y2="130" stroke="#00FF41" stroke-width="3" opacity="0.4"/>
    <line x1="-152" y1="0" x2="-200" y2="0" stroke="#00FF41" stroke-width="3" opacity="0.4"/>
    <line x1="0" y1="-152" x2="0" y2="-190" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="152" x2="0" y2="190" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="14" fill="#00FF41" opacity="0.8"/>
    <circle cx="0" cy="0" r="6" fill="#0D0D0D"/>
    <!-- Glow rings -->
    <circle cx="0" cy="0" r="210" fill="none" stroke="#00FF41" stroke-width="1" opacity="0.1"/>
    <circle cx="0" cy="0" r="230" fill="none" stroke="#00FF41" stroke-width="1" opacity="0.05"/>
  </g>
</svg>
